services:
  backend:
    container_name: backend
    image: backend:v1
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    networks:
      - app-net
    environment:
      MCP_RAG_URL: http://mcp-rag:8001/mcp
      MCP_WEB_URL: http://mcp-web:8002/mcp
      MCP_MEMORY_URL: http://mcp-memory:8003/mcp
      ENVIROMENT: docker
    develop:
      watch:
        - action: sync
          path: .
          target: /app
    volumes:
      - ./app.db:/app/app.db

  
  mcp-rag:
    container_name: mcp-rag
    image: mcp-rag:v1
    build:
      context: .
      dockerfile: Dockerfile.rag
    ports:
      - "8001:8001"
    networks:
      - app-net
    environment:
      ENVIRONMENT: docker
    develop:
      watch:
        - action: sync
          path: .
          target: /app
    volumes:
      - ./app.db:/app/app.db

  mcp-web:
    container_name: mcp-web
    image: mcp-web:v1
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8002:8002"
    networks:
      - app-net
    develop:
      watch:
        - action: sync
          path: .
          target: /app
    volumes:
      - ./app.db:/app/app.db


  mcp-memory:
    container_name: mcp-memory
    image: mcp-memory:v1
    build:
      context: .
      dockerfile: Dockerfile.memory
    ports:
      - "8003:8003"
    networks:
      - app-net
    develop:
      watch:
        - action: sync
          path: .
          target: /app
    volumes:
      - ./app.db:/app/app.db

  chroma:
    container_name: chroma
    image: chromadb/chroma:latest
    ports:
      - "8004:8000"
    networks:
      - app-net
    volumes:
      - chroma-data:/chroma/.chroma
    environment:
      IS_PERSISTENT: "TRUE"

networks:
  app-net:
    driver: bridge

volumes:
  chroma-data: